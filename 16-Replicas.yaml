apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replica
  labels:
    project: roboshop
    environment: dev
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: frontend
      component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: frontend
        component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx